<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>全景创作者工作台 - 项目专业版</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core/index.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/markers-plugin/index.min.css">
    <style>
        body { margin: 0; background: #1e1e1e; color: #fff; display: flex; height: 100vh; font-family: sans-serif; overflow: hidden; }
        .sidebar { width: 320px; background: #2d2d2d; border-left: 1px solid #111; padding: 20px; display: flex; flex-direction: column; z-index: 10; overflow-y: auto; }
        .main-content { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; }
        #viewer { width: 100%; height: 100%; display: none; }

        .upload-box { text-align: center; color: #aaa; }
        .upload-btn { background: #3478f6; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; font-size: 14px; margin-top: 10px; width: 100%;}

        .panel-group { margin-bottom: 25px; background: #333; padding: 15px; border-radius: 8px; }
        .panel-group label { display: block; margin-bottom: 8px; font-size: 13px; color: #ccc; font-weight: bold; }
        .panel-group input[type="text"] { width: 100%; background: #1a1a1a; border: 1px solid #444; color: white; padding: 8px; border-radius: 4px; box-sizing: border-box;}
        .save-btn { background: #52c41a; color: white; border: none; padding: 12px; width: 100%; cursor: pointer; border-radius: 4px; font-weight: bold; margin-bottom: 20px;}

        .thumb-list { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px; }
        .thumb-item { width: 80px; height: 60px; border-radius: 4px; border: 2px solid #555; background-size: cover; background-position: center; position: relative; cursor: pointer; opacity: 0.6; transition: 0.2s;}
        .thumb-item:hover { opacity: 1; }
        .thumb-item.active { border-color: #ff7000; opacity: 1; box-shadow: 0 0 10px #ff7000; }
        .thumb-item span { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.8); font-size: 10px; text-align: center; padding: 2px; }
        .badge-main { position: absolute; top: -5px; right: -5px; background: #ff7000; color: white; font-size: 10px; padding: 2px 5px; border-radius: 10px; font-weight: bold; z-index: 5;}

        .btn-delete-thumb { position: absolute; top: -8px; left: -8px; background: #ff4d4f; color: white; border-radius: 50%; width: 20px; height: 20px; text-align: center; line-height: 18px; font-size: 16px; cursor: pointer; display: none; z-index: 10; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.5);}
        .thumb-item:hover .btn-delete-thumb { display: block; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 999; }
        .modal-content { background: #2b2b2b; padding: 25px; border-radius: 12px; width: 350px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #444; }
        .modal-tabs { display: flex; gap: 15px; margin-bottom: 20px; }
        .modal-input-group { margin-bottom: 15px; }
        .modal-input-group input, .modal-input-group textarea, .modal-input-group select { width: 100%; background: #1a1a1a; border: 1px solid #444; color: white; padding: 10px; border-radius: 6px; box-sizing: border-box; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 25px; }
        .modal-btn { padding: 8px 15px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; }
        .btn-cancel { background: #555; color: white; }
        .btn-confirm { background: #3478f6; color: white; }

        #editingBar { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 20px; font-size: 14px; z-index: 10; display: none; border: 1px solid #555; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
<div class="main-content">
    <div id="editingBar">正在编辑: <span id="editingName" style="color:#ff7000; font-weight:bold;">主场景</span></div>
    <div class="upload-box" id="uploadBox">
        <h2>🌌 开启全景项目</h2>
        <p>请先上传一张作为封面的【主场景全景图】</p>
        <input type="file" id="mainFileInput" accept="image/jpeg, image/png" style="display:none;" onchange="handleMainUpload()">
        <button class="upload-btn" onclick="document.getElementById('mainFileInput').click()" style="width: auto; padding: 12px 30px;">上传主场景</button>
    </div>
    <div id="viewer"></div>
</div>

<div class="sidebar">
    <div class="panel-group">
        <label>项目名称 (主页展示)</label>
        <input type="text" id="sceneTitle" placeholder="给整个项目起个名字">
    </div>
    <button class="save-btn" onclick="saveSceneInfo()">💾 保存名称</button>

    <div class="panel-group" id="subScenePanel" style="display:none; border: 1px solid #444;">
        <label>🔗 场景库 (点击可切换编辑)</label>
        <p style="font-size: 11px; color: #888; margin-top: 0;">在此上传副房间。点击缩略图即可进入该房间打点布置。</p>
        <input type="file" id="subFileInput" accept="image/jpeg, image/png" style="display:none;" onchange="handleSubUpload()">
        <button class="upload-btn" style="background: #444;" onclick="document.getElementById('subFileInput').click()">+ 上传新房间</button>
        <div class="thumb-list" id="thumbList"></div>
    </div>
    <a href="/" style="color: #3478f6; text-decoration: none; font-size: 14px;">⬅️ 返回长廊主页</a>
</div>

<div class="modal-overlay" id="markerModal">
    <div class="modal-content">
        <h3 style="margin-top:0; border-bottom:1px solid #444; padding-bottom:10px;">添加互动标记</h3>
        <div class="modal-tabs">
            <label><input type="radio" name="markerType" value="info" checked onchange="toggleModalType()"> 📍 信息展示</label>
            <label><input type="radio" name="markerType" value="arrow" onchange="toggleModalType()"> ⬆️ 场景跳转</label>
        </div>
        <div id="infoForm">
            <div class="modal-input-group"><input type="text" id="infoTitle" placeholder="物品/地点名称"></div>
            <div class="modal-input-group"><textarea id="infoDesc" placeholder="详细介绍文字..."></textarea></div>
        </div>
        <div id="arrowForm" style="display: none;">
            <div class="modal-input-group"><input type="text" id="arrowTitle" placeholder="前往哪里？(如：主卧)"></div>
            <div class="modal-input-group">
                <select id="arrowTarget"><option value="">请先在右侧上传新房间！</option></select>
            </div>
        </div>
        <div class="modal-actions">
            <button class="modal-btn btn-cancel" onclick="closeModal()">取消</button>
            <button class="modal-btn btn-confirm" onclick="confirmMarker()">确定添加</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="markerActionModal">
    <div class="modal-content" style="width: 280px; text-align: center;">
        <h3 style="margin-top:0; border-bottom:1px solid #444; padding-bottom:10px;">操作标记</h3>
        <p style="color: #ccc; font-size: 14px; margin-bottom: 25px;">确定要彻底删除这个标记吗？</p>
        <div class="modal-actions" style="justify-content: center; margin-top: 0;">
            <button class="modal-btn btn-cancel" onclick="closeMarkerActionModal()">取消</button>
            <button class="modal-btn" style="background: #ff4d4f; color: white;" onclick="confirmDeleteMarker()">删除标记</button>
        </div>
    </div>
</div>

<script type="importmap"> { "imports": { "three": "https://cdn.jsdelivr.net/npm/three/build/three.module.js", "@photo-sphere-viewer/core": "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core/index.module.js", "@photo-sphere-viewer/markers-plugin": "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/markers-plugin/index.module.js" } } </script>

<script type="module">
    import { Viewer } from '@photo-sphere-viewer/core';
    import { MarkersPlugin } from '@photo-sphere-viewer/markers-plugin';

    let viewer = null;
    let markersPlugin = null;
    let projectMainId = null;
    let editingSceneId = null;
    let tempClickPos = null;
    let allProjectScenes = [];

    window.handleMainUpload = async () => {
        const file = document.getElementById('mainFileInput').files[0];
        if (!file) return;
        await doUpload(file, null);
    };

    window.handleSubUpload = async () => {
        const file = document.getElementById('subFileInput').files[0];
        if (!file) return;
        await doUpload(file, projectMainId);
    };

    async function doUpload(file, parentId) {
        const formData = new FormData();
        formData.append('image', file);
        if (parentId) formData.append('parentId', parentId);

        try {
            const res = await fetch('/api/upload', { method: 'POST', body: formData });
            const data = await res.json();

            if (data.success) {
                if (!parentId) {
                    projectMainId = data.sceneId;
                    let myWorks = JSON.parse(localStorage.getItem('myPanoWorks') || '[]');
                    if (!myWorks.includes(projectMainId)) { myWorks.push(projectMainId); localStorage.setItem('myPanoWorks', JSON.stringify(myWorks)); }

                    document.getElementById('uploadBox').style.display = 'none';
                    document.getElementById('subScenePanel').style.display = 'block';
                    document.getElementById('sceneTitle').value = "项目 " + projectMainId;

                    allProjectScenes.push({ id: data.sceneId, url: data.imageUrl, isMain: true });
                    switchEditScene(data.sceneId);
                } else {
                    allProjectScenes.push({ id: data.sceneId, url: data.imageUrl, isMain: false });
                    renderThumbList();
                }
            }
        } catch (err) { alert("上传失败，请检查网络！"); }
    }

    window.switchEditScene = async (targetId) => {
        editingSceneId = targetId;
        renderThumbList();

        document.getElementById('uploadBox').style.display = 'none';
        document.getElementById('viewer').style.display = 'block';

        const res = await fetch(`/api/scenes/${targetId}`);
        const data = await res.json();

        const targetScene = allProjectScenes.find(s => s.id == targetId);
        document.getElementById('editingBar').style.display = 'block';
        document.getElementById('editingName').innerText = targetScene.isMain ? '主场景封面' : `副房间 (ID:${targetId})`;

        const formatted = data.markers.map(m => ({
            id: `m-${m.id}`, position: { yaw: m.yaw, pitch: m.pitch },
            html: m.target_scene_id ? `<div style="font-size:40px; text-shadow:0 0 10px white;">⬆️</div>` : `<div style="font-size:30px; text-shadow:0 0 5px white;">📍</div>`,
            tooltip: { content: m.title }
        }));

        if (viewer) viewer.destroy();
        viewer = new Viewer({
            container: document.querySelector('#viewer'),
            panorama: targetScene.url,
            defaultZoomLvl: 0,
            plugins: [ [MarkersPlugin, { markers: formatted }] ]
        });
        markersPlugin = viewer.getPlugin(MarkersPlugin);

        viewer.addEventListener('dblclick', ({ data: pos }) => {
            tempClickPos = pos;
            document.getElementById('markerModal').style.display = 'flex';
        });

        // ===== 新增：监听点击已有标记，触发删除弹窗 =====
        markersPlugin.addEventListener('select-marker', ({ marker }) => {
            selectedMarkerId = marker.id;
            document.getElementById('markerActionModal').style.display = 'flex';
        });
    };

    function renderThumbList() {
        const thumbList = document.getElementById('thumbList');
        thumbList.innerHTML = allProjectScenes.map(s => `
                <div class="thumb-item ${s.id == editingSceneId ? 'active' : ''}" style="background-image: url('${s.url}')" onclick="switchEditScene(${s.id})">
                    ${s.isMain ? '<div class="badge-main">主图</div>' : ''}
                    <div class="btn-delete-thumb" onclick="event.stopPropagation(); deleteScene(${s.id}, ${s.isMain})">×</div>
                    <span>ID: ${s.id}</span>
                </div>
            `).join('');

        const select = document.getElementById('arrowTarget');
        const targetOptions = allProjectScenes.filter(s => s.id != editingSceneId);
        if (targetOptions.length > 0) {
            select.innerHTML = targetOptions.map(s => `<option value="${s.id}">${s.isMain ? '返回主场景' : `房间 ID: ${s.id}`}</option>`).join('');
        } else {
            select.innerHTML = `<option value="">没有其他房间可跳了</option>`;
        }
    }

    window.deleteScene = async (id, isMain) => {
        const msg = isMain ? "警告：这是主场景封面！\n删除它将彻底摧毁整个项目！\n\n确定要永久删除吗？" : "确定要删除这个房间吗？";
        if (!confirm(msg)) return;

        try {
            await fetch(`/api/scenes/${id}`, { method: 'DELETE' });
            if (isMain) {
                alert('整个项目已删除！即将返回主页。');
                window.location.href = '/';
                return;
            }
            allProjectScenes = allProjectScenes.filter(s => s.id != id);
            if (editingSceneId == id) switchEditScene(projectMainId);
            else renderThumbList();
        } catch(err) { alert("删除失败"); }
    };

    window.saveSceneInfo = async () => {
        if(!projectMainId) return;
        const title = document.getElementById('sceneTitle').value;
        await fetch(`/api/scenes/${projectMainId}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ title }) });
        alert('项目名称保存成功！');
    };

    // 添加标记相关
    window.toggleModalType = () => {
        const isArrow = document.querySelector('input[name="markerType"]:checked').value === 'arrow';
        document.getElementById('infoForm').style.display = isArrow ? 'none' : 'block';
        document.getElementById('arrowForm').style.display = isArrow ? 'block' : 'none';
    };

    window.closeModal = () => {
        document.getElementById('markerModal').style.display = 'none';
        document.getElementById('infoTitle').value = ''; document.getElementById('infoDesc').value = ''; document.getElementById('arrowTitle').value = '';
    };

    window.confirmMarker = async () => {
        const isArrow = document.querySelector('input[name="markerType"]:checked').value === 'arrow';
        let title = isArrow ? document.getElementById('arrowTitle').value : document.getElementById('infoTitle').value;
        if (!title) return alert("名称必填！");

        let targetId = null; let desc = "";
        if (isArrow) {
            targetId = document.getElementById('arrowTarget').value;
            if (!targetId) return alert("请选择目标房间！");
        } else { desc = document.getElementById('infoDesc').value; }

        const newMarker = { yaw: tempClickPos.yaw, pitch: tempClickPos.pitch, title: title, description: desc, target_scene_id: targetId };

        const res = await fetch(`/api/scenes/${editingSceneId}/markers`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(newMarker) });
        const data = await res.json();

        if (data.success) {
            markersPlugin.addMarker({
                id: `m-${data.markerId}`, position: { yaw: tempClickPos.yaw, pitch: tempClickPos.pitch },
                html: isArrow ? `<div style="font-size:40px; text-shadow:0 0 10px white;">⬆️</div>` : `<div style="font-size:30px; text-shadow:0 0 5px white;">📍</div>`,
                tooltip: { content: title }
            });
            closeModal();
        }
    };

    // ===== 删除单个标记相关 =====
    let selectedMarkerId = null;

    window.closeMarkerActionModal = () => {
        document.getElementById('markerActionModal').style.display = 'none';
        selectedMarkerId = null;
    };

    window.confirmDeleteMarker = async () => {
        if (!selectedMarkerId) return;
        const dbId = selectedMarkerId.replace('m-', ''); // 去掉 'm-' 前缀拿数据库真实ID
        try {
            const res = await fetch(`/api/markers/${dbId}`, { method: 'DELETE' });
            const data = await res.json();
            if (data.success) {
                markersPlugin.removeMarker(selectedMarkerId); // 画面上抹除
                closeMarkerActionModal();
            }
        } catch(err) { alert("网络连接错误"); }
    };

    // 二次加载逻辑
    const urlParams = new URLSearchParams(window.location.search);
    const editId = urlParams.get('editId');
    if (editId) {
        projectMainId = editId;
        document.getElementById('uploadBox').style.display = 'none';
        document.getElementById('subScenePanel').style.display = 'block';

        fetch(`/api/scenes/${editId}`).then(r => r.json()).then(data => {
            document.getElementById('sceneTitle').value = data.scene.title;
            allProjectScenes.push({ id: data.scene.id, url: data.scene.image_url, isMain: true });

            fetch(`/api/scenes/${editId}/subs`).then(r => r.json()).then(subData => {
                subData.subs.forEach(sub => {
                    allProjectScenes.push({ id: sub.id, url: sub.image_url, isMain: false });
                });
                switchEditScene(projectMainId);
            });
        });
    }
</script>
</body>
</html>
